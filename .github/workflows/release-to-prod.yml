name: Build and Release Binaries

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

env:
  ANDROID_API_LEVEL: "24"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubicloud-standard-4
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            target: x86_64-unknown-linux-gnu
            archive_kind: tar
            binary_suffix: ""
          - platform: android
            target: aarch64-linux-android
            archive_kind: tar
            binary_suffix: ""
          - platform: windows
            target: x86_64-pc-windows-gnu
            archive_kind: zip
            binary_suffix: ".exe"
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Protoc
        uses: arduino/setup-protoc@v3

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Set up Android NDK
        if: matrix.platform == 'android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Install Windows cross toolchain
        if: matrix.platform == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            zip

      - name: Cache cargo dependencies
        uses: ubicloud/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Cache sccache folder
        uses: ubicloud/cache@v4
        with:
          path: ~/.cache/sccache
          key: ${{ runner.os }}-${{ matrix.target }}-sccache-${{ hashFiles('**/*.rs', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-sccache-
            ${{ runner.os }}-sccache-

      - name: Build Android release binaries
        if: matrix.platform == 'android'
        run: |
          cargo build --release --timings \
            --target "$TARGET" \
            --package mempalace-rs \
            --package mempalace-mcp-bin
        env:
          RUSTC_WRAPPER: "sccache"
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang
          CARGO_TARGET_AARCH64_LINUX_ANDROID_AR: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang
          CXX_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ env.ANDROID_API_LEVEL }}-clang++
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          RANLIB_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Build Ubuntu release binaries
        if: matrix.platform == 'ubuntu'
        run: |
          cargo build --release --timings \
            --target "$TARGET" \
            --package mempalace-rs \
            --package mempalace-mcp-bin
        env:
          RUSTC_WRAPPER: "sccache"

      - name: Build Windows release binaries
        if: matrix.platform == 'windows'
        run: |
          cargo build --release --timings \
            --target "$TARGET" \
            --package mempalace-rs \
            --package mempalace-mcp-bin
        env:
          RUSTC_WRAPPER: "sccache"
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_AR: x86_64-w64-mingw32-ar
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
          AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ar
          RANLIB_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ranlib
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Publish cargo timings summary
        if: always()
        run: |
          python3 - <<'PY'
          import html
          import os
          import pathlib
          import re

          summary_path = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_dir = pathlib.Path("target/cargo-timings")

          if not report_dir.exists():
              with summary_path.open("a", encoding="utf-8") as summary:
                  summary.write("## Cargo timings\n\nNo timing report was generated.\n")
              raise SystemExit(0)

          reports = sorted(
              report_dir.glob("cargo-timing-*.html"),
              key=lambda path: path.stat().st_mtime,
              reverse=True,
          )
          report = reports[0] if reports else report_dir / "cargo-timing.html"

          if not report.exists():
              with summary_path.open("a", encoding="utf-8") as summary:
                  summary.write("## Cargo timings\n\nNo timing report was generated.\n")
              raise SystemExit(0)

          def clean(value: str) -> str:
              value = re.sub(r"<br\s*/?>", " | ", value)
              value = re.sub(r"<[^>]+>", " ", value)
              value = html.unescape(value)
              return " ".join(value.split())

          text = report.read_text(encoding="utf-8", errors="replace")

          summary_table = re.search(
              r'<table class="my-table summary-table">(.*?)</table>',
              text,
              re.S,
          )
          metrics = {}
          if summary_table:
              for key, value in re.findall(
                  r"<td>([^<]+):</td><td>(.*?)</td>",
                  summary_table.group(1),
                  re.S,
              ):
                  metrics[clean(key)] = clean(value)

          units_table = re.search(r'<table class="my-table">(.*?)</table>', text, re.S)
          top_units = []
          if units_table:
              rows = re.findall(r"<tr>(.*?)</tr>", units_table.group(1), re.S)
              for row in rows[1:6]:
                  cells = [
                      clean(cell)
                      for cell in re.findall(r"<t[dh][^>]*>(.*?)</t[dh]>", row, re.S)
                  ]
                  if len(cells) >= 5:
                      top_units.append((cells[1], cells[2], cells[3], cells[4]))

          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write(f"## Cargo timings: {os.environ['TARGET']}\n\n")
              summary.write(f"- Report: `{report}`\n")
              for key in ("Total time", "Max concurrency", "Fresh units", "Dirty units", "Total units"):
                  value = metrics.get(key)
                  if value:
                      summary.write(f"- {key}: `{value}`\n")

              if top_units:
                  summary.write("\n### Slowest units\n\n")
                  summary.write("| Unit | Total | Frontend | Codegen |\n")
                  summary.write("| --- | --- | --- | --- |\n")
                  for unit, total, frontend, codegen in top_units:
                      summary.write(f"| {unit} | {total} | {frontend or '-'} | {codegen or '-'} |\n")
          PY

      - name: Package release artifacts
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist/stage dist/out

          binary_suffix="${{ matrix.binary_suffix }}"
          archive_kind="${{ matrix.archive_kind }}"
          cli_name="mempalace-rs${binary_suffix}"
          mcp_name="mempalace-mcp${binary_suffix}"

          cp "target/$TARGET/release/${cli_name}" "dist/stage/${cli_name}"
          cp "target/$TARGET/release/${mcp_name}" "dist/stage/${mcp_name}"

          if [[ "$archive_kind" == "zip" ]]; then
            (
              cd dist/stage
              zip -q "../out/mempalace-rs-${TARGET}.zip" "$cli_name"
              zip -q "../out/mempalace-mcp-${TARGET}.zip" "$mcp_name"
            )
          else
            tar -C dist/stage -czf "dist/out/mempalace-rs-${TARGET}.tar.gz" "$cli_name"
            tar -C dist/stage -czf "dist/out/mempalace-mcp-${TARGET}.tar.gz" "$mcp_name"
          fi

          (
            cd dist/out
            sha256sum mempalace-rs-* mempalace-mcp-* > "SHA256SUMS-${TARGET}.txt"
          )

      - name: Upload packaged workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries-${{ matrix.target }}
          path: dist/out/*
          if-no-files-found: error

      - name: Publish build summary
        run: |
          {
            echo "## Release artifacts: $TARGET"
            echo
            printf -- '- Platform: `%s`\n' "${{ matrix.platform }}"
            printf -- '- Target: `%s`\n' "$TARGET"
            echo
            echo "### Files"
            echo
            for file in dist/out/*; do
              printf -- '- `%s`\n' "$(basename "$file")"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Publish GitHub release
    runs-on: ubicloud-standard-4
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-binaries-*
          path: dist
          merge-multiple: true

      - name: Generate aggregate checksums
        run: |
          set -euo pipefail
          (
            cd dist
            rm -f SHA256SUMS.txt
            sha256sum mempalace-rs-* mempalace-mcp-* > SHA256SUMS.txt
          )
          ls -la dist

      - name: Update rolling release tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -f rolling-android "$GITHUB_SHA"
          git push origin refs/tags/rolling-android --force

      - name: Publish rolling GitHub release assets
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling-android
          name: Rolling Release
          prerelease: true
          generate_release_notes: false
          body: |
            Rolling release for `${{ github.sha }}`.

            Targets:
            - `x86_64-unknown-linux-gnu`
            - `aarch64-linux-android`
            - `x86_64-pc-windows-gnu`
          files: |
            dist/*

      - name: Publish tagged GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*

      - name: Publish release summary
        run: |
          {
            echo "## GitHub release assets"
            echo
            for file in dist/*; do
              printf -- '- `%s`\n' "$(basename "$file")"
            done
          } >> "$GITHUB_STEP_SUMMARY"
