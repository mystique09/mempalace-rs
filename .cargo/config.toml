# Fix ring/cc crate when xcrun reports SDK 26.5 but the
# compiler can't find system headers (TargetConditionals.h).
#
# Root cause: cc-rs 1.2.65 only adds -isysroot for macOS when
# is_xctoolchain_clang() is true (path contains ".xctoolchain/").
# Command Line Tools cc at /usr/bin/cc does NOT match, so -isysroot
# is never added even when SDKROOT is set. The compiler can't find
# system headers without -isysroot on this SDK version.
#
# Fix: set SDKROOT so Apple clang can find system headers even when
# cc-rs skips -isysroot for non-xctoolchain Clang (Command Line Tools).
# Apple clang natively respects SDKROOT — no -isysroot flag needed.
# On Linux/Windows, SDKROOT is harmless (unrecognized env, ignored).
#
# Also pin MACOSX_DEPLOYMENT_TARGET to match the actual OS (26.4),
# not the SDK version (26.5). cc-rs only reads this on Apple targets.
#
# To find your SDK path: xcrun --show-sdk-path
[env]
MACOSX_DEPLOYMENT_TARGET = "26.4"
SDKROOT = "/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
